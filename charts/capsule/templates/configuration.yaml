        opts:
          {{- toYaml . |  nindent 10 }}
        {{- end }}
        admissionReviewVersions:
          - v1
          - v1beta1
        path: "/rules/generic/validating"
        failurePolicy:  {{ .failurePolicy }}
        matchPolicy: {{ .matchPolicy }}
        {{- with .namespaceSelector }}
        namespaceSelector:
          {{- toYaml . |  nindent 10 }}
        {{- end }}
        {{- with .objectSelector }}
        objectSelector:
          {{- toYaml . |  nindent 10 }}
        {{- end }}
        {{- with .matchConditions }}
        matchConditions:
          {{- toYaml . |  nindent 10 }}
        {{- end }}
        rules:
          {{- toYaml .rules |  nindent 10 }}
        sideEffects: None
        timeoutSeconds: {{ $.Values.webhooks.validatingWebhooksTimeoutSeconds }}
        {{- end }}
