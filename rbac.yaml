---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: online-boutique
  namespace: solar-test
spec:
  hostnames:
  - boutique.app.example.ch
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: tenant-wind-gateway
    namespace: tenant-wind-system
  rules:
  - filters:
    - requestRedirect:
        scheme: https
        statusCode: 301
      type: RequestRedirect
    matches:
    - path:
        type: PathPrefix
        value: /

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: online-boutique-checkout
  namespace: solar-prod
spec:
  hostnames:
  - checkout.boutique.app.example.ch
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: tenant-solar-gateway
    namespace: tenant-solar-system
  rules:
  - filters:
    - requestRedirect:
        scheme: https
        statusCode: 301
      type: RequestRedirect
    matches:
    - path:
        type: PathPrefix
        value: /
