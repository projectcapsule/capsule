---
apiVersion: v1
kind: Namespace
metadata:
  name: tenant-green-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: capsule-gateway-manager
  namespace: tenant-green-system
rules:
  - apiGroups:
      - gateway.networking.k8s.io
    resources:
      - gateways
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: capsule-gateway-manager
  namespace: tenant-green-system
subjects:
  - kind: ServiceAccount
    name: capsule
    namespace: capsule-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: capsule-gateway-manager

