---
apiVersion: capsule.clastix.io/v1beta2
kind: ResourcePool
metadata:
  name: sampler-2
spec:
  selectors:
  - matchLabels:
      capsule.clastix.io/tenant: solar
  - matchLabels:
      capsule.clastix.io/tenant: wind
  - matchLabels:
      test: "ns"
  quota:
    hard:
      count/pods: "10"
---
apiVersion: capsule.clastix.io/v1beta2
kind: ResourcePool
metadata:
  name: sampler
spec:
  config:
    defaultsZero: false
    orderedQueue: false
  selectors:
  - matchLabels:
      capsule.clastix.io/tenant: solar
  - matchLabels:
      capsule.clastix.io/tenant: wind
  namespaceMaximum:
    limits.cpu: "1"
    limits.memory: 1Gi
  quota:
    hard:
      limits.cpu: "2"
      limits.memory: 2Gi
      requests.cpu: "2"
      requests.memory: 2Gi
      requests.storage: "5Gi"




